<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="/style.css">
    <title>TODO Card</title>
</head>
<body>
    <article data-testid="test-todo-card" class="container">
        <!-- Task Title -->
        <header>
            <h2 data-testid="test-todo-title">Complete My Final Year Project</h2>
        </header>
        
        <!-- Task Description -->
         <div id="collapsible-todo" data-testid="test-todo-collapsible-section">
            <p data-testid="test-todo-description">Complete my final year project by researching the topic, designing the system, 
               developing the solution, testing functionality, and preparing documentation for submission.
            </p>
         </div>

         <!-- Toggle Button -->
          <button data-testid="test-todo-expand-toggle" aria-expanded="false" aria-controls="collapsible-todo" id="toggle-btn">

          </button>
        

        <!-- Priority and Status -->
        
        <span data-testid="test-todo-priority-indicator" class="priority-icon">🟢</span>
        <span data-testid="test-todo-priority" aria-label="Priority: High" class="priority-span">High</span>
        <span data-testid="test-todo-status" aria-label="Task Status" class="status-span">In Progress</span>

        <label for="status-control">Task Status</label>
        <select data-testid="test-todo-status-control" name="status-control" id="status-control">
            <option value="Pending">Pending</option>
            <option value="In Progress">In Progress</option>
            <option value="Done">Done</option>
        </select>


        <!-- Label and Checkbox -->
        <input type="checkbox" data-testid="test-todo-complete-toggle" id="todo">
        <label for="todo">Mark as Complete</label>

        <!-- Due Date, Time Remaining and Overdue Indicator -->
        <time datetime="2026-04-16T00:00" data-testid="test-todo-due-date" class="due-date">Due: April 16th, 2026</time>
        <time data-testid="test-todo-time-remaining" aria-live="polite" class="time-remaining"></time>
        <span data-testid="test-todo-overdue-indicator" class="overdue-indicator" aria-live="polite"></span>


        <!-- Tag List -->
        <ul data-testid="test-todo-tags" role="list">
           <li data-testid="test-todo-tag-work">work</li>
           <li data-testid="test-todo-tag-urgent">urgent</li>
        </ul>

        <footer>
            <button data-testid="test-todo-edit-button" class="edit-btn">Edit</button>
            <button data-testid="test-todo-delete-button" class="delete-btn">Delete</button>
        </footer>

        <form data-testid="test-todo-edit-form" class="edit-form">
            <label for="edit-title">Title</label>
            <input type="text" data-testid="test-todo-edit-title-input" id="edit-title">

            <label for="edit-description">Description</label>
            <textarea name="edit-description" id="edit-description" data-testid="test-todo-edit-description-input">
            </textarea>

            <label for="edit-priority">Priority</label>
            <select name="edit-priority" id="edit-priority" data-testid="test-todo-edit-priority-select">
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
            </select>

            <label for="edit-due-date">Due Date</label>
            <input type="datetime-local" data-testid="test-todo-edit-due-date-input">

            <button data-testid="test-todo-save-button">Save</button>
            <button data-testid="test-todo-cancel-button">Cancel</button>

        </form>

    </article>


    <script src="/script.js"></script>
</body>
</html>
